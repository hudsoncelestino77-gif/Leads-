<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Leads Locais</title>
    <link rel="stylesheet" href="https://jsdelivr.net">
    <style>
        body { background: #f5f5f5; padding: 15px; font-family: system-ui, sans-serif; }
        .card { border-radius: 12px; border: none; }
        .form-control-lg, .btn-lg { border-radius: 8px; font-size: 16px; }
        .table-responsive { background: white; border-radius: 8px; margin-top: 15px; }
        th { background: #212529 !important; color: white !important; }
    </style>
</head>
<body>

<div class="container-fluid p-0">
    <div class="card shadow-sm mb-3">
        <div class="card-body p-3">
            <h4 class="fw-bold mb-3 text-primary">Leads Locais</h4>

            <div class="row g-2">
                <div class="col-12">
                    <label class="form-label small fw-bold mb-1">CEP</label>
                    <input type="text" id="cep" class="form-control form-control-lg" placeholder="Digite o CEP (Ex: 08255090)" pattern="\d*" inputmode="numeric">
                </div>

                <div class="col-12">
                    <label class="form-label small fw-bold mb-1">Tipo de Empresa</label>
                    <input type="text" id="tipo" class="form-control form-control-lg" placeholder="Ex: mercado, academia, hotel">
                </div>

                <div class="col-6">
                    <label class="form-label small fw-bold mb-1">Raio (km)</label>
                    <input type="number" id="raio" class="form-control form-control-lg" value="5" inputmode="numeric">
                </div>

                <div class="col-6 d-flex align-items-end">
                    <button class="btn btn-primary btn-lg w-100 fw-bold" id="btnBuscar" onclick="buscar()">
                        Buscar
                    </button>
                </div>
            </div>

            <hr class="my-3">

            <div class="d-flex justify-content-between align-items-center mb-2">
                <button class="btn btn-success fw-bold btn-sm" onclick="exportarCSV()">📊 Exportar CSV</button>
                <span id="contador" class="badge bg-secondary p-2">0 leads</span>
            </div>

            <div class="table-responsive">
                <table class="table table-striped align-middle mb-0" id="tabela">
                    <thead>
                        <tr>
                            <th>Empresa</th>
                            <th>Contato</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="2" class="text-center text-muted py-3 small">Insira os dados e clique em buscar.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
let resultados = [];

async function buscar() {
    const btn = document.getElementById("btnBuscar");
    const cepInput = document.getElementById("cep").value.replace(/\D/g, '');
    const tipo = document.getElementById("tipo").value.trim().toLowerCase();
    const raio = document.getElementById("raio").value;
    const tbody = document.querySelector("#tabela tbody");

    if (cepInput.length !== 8) {
        alert("Digite um CEP válido com 8 números.");
        return;
    }

    btn.disabled = true;
    btn.innerText = "Buscando...";
    tbody.innerHTML = `<tr><td colspan="2" class="text-center py-4"><div class="spinner-border spinner-border-sm text-primary me-2"></div>Procurando na região...</td></tr>`;

    try {
        const viaCepResponse = await fetch(`https://viacep.com.br{cepInput}/json/`);
        const endereco = await viaCepResponse.json();

        if (endereco.erro) throw new Error("CEP inválido.");

        let buscaGeo = `${endereco.localidade}, ${endereco.uf}, Brasil`;
        if (endereco.logradouro) buscaGeo = `${endereco.logradouro}, ${endereco.bairro}, ${buscaGeo}`;

        const geoResponse = await fetch(
            `https://openstreetmap.org{encodeURIComponent(buscaGeo)}&format=json&limit=1`,
            { headers: { 'User-Agent': 'LeadsApp/1.0' } }
        );
        const geoData = await geoResponse.json();

        if (!geoData || geoData.length === 0) throw new Error("Local não encontrado.");

        const lat = geoData[0].lat;
        const lon = geoData[0].lon;
        const metros = raio * 1000;

        const queryOverpass = `[out:json][timeout:25];(nwr["shop"](around:${metros},${lat},${lon});nwr["amenity"](around:${metros},${lat},${lon});nwr["leisure"](around:${metros},${lat},${lon}););out body center;`;

        const overpassResponse = await fetch("https://overpass-api.de", {
            method: "POST",
            body: queryOverpass
        });
        const data = await overpassResponse.json();

        if (!data.elements) {
            resultados = [];
            renderizar();
            return;
        }

        resultados = data.elements
            .filter(e => {
                if (!e.tags || !e.tags.name) return false;
                if (!tipo) return true;
                const nome = (e.tags.name || "").toLowerCase();
                const amenity = (e.tags.amenity || "").toLowerCase();
                const shop = (e.tags.shop || "").toLowerCase();
                return nome.includes(tipo) || amenity.includes(tipo) || shop.includes(tipo);
            })
            .map(e => {
                let rua = e.tags["addr:street"] || "";
                let num = e.tags["addr:housenumber"] || "";
                let enderecoCompleto = [rua, num].filter(Boolean).join(", ") || "Endereço no mapa";
                return {
                    nome: e.tags.name,
                    endereco: enderecoCompleto,
                    telefone: e.tags.phone || e.tags["contact:phone"] || "",
                    site: e.tags.website || ""
                };
            });

        renderizar();

    } catch (error) {
        alert("Erro na busca: " + error.message);
        tbody.innerHTML = `<tr><td colspan="2" class="text-center text-danger py-3">Erro ao carregar dados. Tente novamente.</td></tr>`;
    } finally {
        btn.disabled = false;
        btn.innerText = "Buscar";
    }
}

function renderizar() {
    const tbody = document.querySelector("#tabela tbody");
    const contador = document.getElementById("contador");
    tbody.innerHTML = "";
    
    contador.innerText = `${resultados.length} leads`;

    if (resultados.length === 0) {
        tbody.innerHTML = `<tr><td colspan="2" class="text-center text-muted py-3">Nenhum comércio encontrado nesse raio.</td></tr>`;
        return;
    }

    resultados.forEach(item => {
        let acoes = "";
        if (item.telefone) {
            let numClean = item.telefone.replace(/\D/g, '');
            if (!numClean.startsWith('55') && numClean.length >= 10) numClean = '55' + numClean;
            acoes += `<a href="https://wa.me{numClean}" target="_blank" class="btn btn-sm btn-success d-inline-block me-1 py-1 px-2" style="font-size:11px;">🟢 Whats</a>`;
        }
        if (item.site) {
            acoes += `<a href="${item.site}" target="_blank" class="btn btn-sm btn-outline-primary d-inline-block py-1 px-2" style="font-size:11px;">🌐 Site</a>`;
        }
        if (!acoes) acoes = `<span class="text-muted small">Sem contato</span>`;

        tbody.innerHTML += `
            <tr>
                <td>
                    <div class="fw-bold text-dark" style="font-size:14px;">${item.nome}</div>
                    <div class="text-muted" style="font-size:11px;">${item.endereco}</div>
                </td>
                <td style="width: 100px; text-align: right;">${acoes}</td>
            </tr>
        `;
    });
}

function exportarCSV() {
    if (resultados.length === 0) return alert("Busque dados primeiro.");
    let csv = "\uFEFFEmpresa,Endereco,Telefone,Site\n";
    resultados.forEach(r => {
        csv += `"${r.nome.replace(/"/g, '""')}","${r.endereco.replace(/"/g, '""')}","${r.telefone}","${r.site}"\n`;
    });
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "leads.csv";
    link.click();
}
</script>

</body>
</html>
